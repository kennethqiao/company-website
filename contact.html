<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - 玖益包装</title>
    <meta name="description" content="联系玖益包装销售团队，获取马口铁奶粉罐报价。">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">玖益包装</a>
                <ul class="nav-links">
                    <li><a href="index.html">首页</a></li>
                    <li><a href="about.html">关于我们</a></li>
                    <li><a href="products.html">产品服务</a></li>
                    <li><a href="contact.html" class="active">联系我们</a></li>
                </ul>
                <div class="burger">
                    <div class="line1"></div>
                    <div class="line2"></div>
                    <div class="line3"></div>
                </div>
            </nav>
        </div>
    </header>

    <section class="hero" style="margin-top: 60px; height: 50vh; text-align: center; padding-top: 120px;">
        <h1>联系我们</h1>
        <p>欢迎与我们联系，获取专业的包装解决方案</p>
        <div style="width: 60px; height: 2px; background-color: #3498db; margin: 15px auto 0;"></div>
    </section>

    <section class="section">
        <div class="container">
            <h2 class="section-title">联系方式</h2>
            <div class="contact-info">
                <div class="contact-item">
                    <h4>公司地址</h4>
                    <p>陕西省咸阳市杨凌示范区博学路种子产业园</p>
                </div>
                <div class="contact-item">
                    <h4>联系电话</h4>
                    <p>销售热线：400-888-9999<br>传真：029-88889999</p>
                </div>
                <div class="contact-item">
                    <h4>电子邮箱</h4>
                    <p>sales@jiuyi-pack.com<br>service@jiuyi-pack.com</p>
                </div>
                <div class="contact-item">
                    <h4>工作时间</h4>
                    <p>周一至周六：8:00-17:30</p>
                </div>
            </div>
        </div>
    </section>

    <section class="section" style="background-color: #fff;">
        <div class="container">
            <h2 class="section-title">在线咨询</h2>
            <form class="contact-form" id="contactForm">
                <div class="form-group">
                    <label for="name">您的姓名 *</label>
                    <input type="text" id="name" name="name" required placeholder="请输入您的姓名">
                </div>
                <div class="form-group">
                    <label for="company">公司名称</label>
                    <input type="text" id="company" name="company" placeholder="请输入您的公司名称">
                </div>
                <div class="form-group">
                    <label for="phone">联系电话 *</label>
                    <input type="tel" id="phone" name="phone" required placeholder="请输入您的联系电话">
                </div>
                <div class="form-group">
                    <label for="email">电子邮箱 *</label>
                    <input type="email" id="email" name="email" required placeholder="请输入您的电子邮箱">
                </div>
                <div class="form-group">
                    <label for="product">感兴趣的产品</label>
                    <select id="product" name="product">
                        <option value="">请选择</option>
                        <option value="round">圆形马口铁奶粉罐</option>
                        <option value="square">方形马口铁奶粉罐</option>
                        <option value="custom">定制印刷奶粉罐</option>
                        <option value="mini">迷你试吃罐</option>
                        <option value="large">家庭装大容量罐</option>
                        <option value="eco">环保可回收罐</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">留言内容 *</label>
                    <textarea id="message" name="message" required placeholder="请描述您的需求，如产品规格、数量等"></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%;">提交咨询</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 玖益包装有限公司. 保留所有权利.</p>
            <ul class="social-links">
                <li><a href="#"><i class="fab fa-weixin"></i></a></li>
                <li><a href="#"><i class="fab fa-weibo"></i></a></li>
                <li><a href="#"><i class="fab fa-linkedin"></i></a></li>
            </ul>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
